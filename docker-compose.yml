version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: iecmms-backend
    restart: unless-stopped
    ports:
      - "102:102"     # IEC 61850 MMS protocol
      - "8000:8000"   # FastAPI (direct access during development)
    cap_add:
      - NET_BIND_SERVICE   # Allow binding to privileged port 102 without running as root
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - scl-uploads:/tmp/scl_uploads
      - tls-certs:/tmp/tls_certs
    networks:
      - iecmms-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: iecmms-frontend
    restart: unless-stopped
    ports:
      - "8080:80"     # UI at http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - iecmms-net

volumes:
  scl-uploads:
    name: iecmms-scl-uploads
  tls-certs:
    name: iecmms-tls-certs

networks:
  iecmms-net:
    name: iecmms-network
    driver: bridge
